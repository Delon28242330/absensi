<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus - Secure Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-base: #030014;
        --neon-cyan: #00f3ff;
        --neon-purple: #9d4edd;
        --surface: rgba(10, 10, 25, 0.6);
        --border: rgba(0, 243, 255, 0.2);
        --text-main: #e2e8f0;
        --text-muted: #94a3b8;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Space Grotesk", sans-serif;
      }

      body {
        background-color: var(--bg-base);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
      }

      /* Particle Canvas */
      #particles {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      /* Core UI Wrapper */
      .ui-wrapper {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 440px;
        padding: 20px;
        perspective: 1500px;
      }

      .hologram-card {
        background: linear-gradient(
          180deg,
          rgba(10, 10, 30, 0.8) 0%,
          rgba(5, 5, 15, 0.9) 100%
        );
        backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 50px 40px;
        box-shadow:
          0 0 40px rgba(0, 243, 255, 0.1),
          inset 0 0 20px rgba(157, 78, 221, 0.1);
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.1s ease;
        animation: bootUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: scale(0.8) translateY(50px);
      }

      @keyframes bootUp {
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      /* Top glowing line */
      .hologram-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 10%;
        width: 80%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--neon-cyan),
          var(--neon-purple),
          transparent
        );
        box-shadow: 0 0 15px var(--neon-cyan);
        border-radius: 50%;
      }

      .system-logo {
        text-align: center;
        margin-bottom: 30px;
        transform: translateZ(30px);
      }

      .system-logo i {
        font-size: 50px;
        background: linear-gradient(
          135deg,
          var(--neon-cyan),
          var(--neon-purple)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 10px rgba(0, 243, 255, 0.4));
      }

      h1 {
        font-size: 28px;
        font-weight: 700;
        text-align: center;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 10px;
        transform: translateZ(25px);
      }

      .subtitle {
        text-align: center;
        color: var(--neon-cyan);
        font-size: 13px;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-bottom: 40px;
        opacity: 0.8;
        transform: translateZ(20px);
      }

      .input-group {
        position: relative;
        margin-bottom: 25px;
        transform: translateZ(15px);
      }

      .input-group input {
        width: 100%;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 16px 16px 16px 50px;
        color: white;
        font-size: 16px;
        outline: none;
        transition: all 0.3s ease;
      }

      .input-group i {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 20px;
        transition: 0.3s;
      }

      .input-group input:focus {
        border-color: var(--neon-cyan);
        box-shadow:
          0 0 15px rgba(0, 243, 255, 0.2),
          inset 0 0 10px rgba(0, 243, 255, 0.1);
        background: rgba(0, 243, 255, 0.02);
      }

      .input-group input:focus + i {
        color: var(--neon-cyan);
        filter: drop-shadow(0 0 5px var(--neon-cyan));
      }

      .btn-cyber {
        width: 100%;
        padding: 16px;
        background: transparent;
        color: var(--neon-cyan);
        border: 1px solid var(--neon-cyan);
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: all 0.3s;
        transform: translateZ(20px);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      .btn-cyber::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--neon-cyan);
        opacity: 0;
        transition: 0.3s;
        z-index: -1;
      }

      .btn-cyber:hover {
        color: var(--bg-base);
        box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
      }

      .btn-cyber:hover::before {
        opacity: 1;
      }

      .role-badge {
        display: flex;
        justify-content: space-between;
        margin-top: 30px;
        padding: 15px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px dashed rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        font-size: 12px;
        transform: translateZ(10px);
      }

      .role-badge div {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .role-badge span {
        color: var(--neon-purple);
        font-weight: 700;
        letter-spacing: 1px;
      }

      /* Scanning Line Effect */
      .scan-line {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 5px;
        background: rgba(0, 243, 255, 0.5);
        box-shadow: 0 0 20px var(--neon-cyan);
        opacity: 0.5;
        animation: scan 3s linear infinite;
        z-index: 100;
        pointer-events: none;
      }

      @keyframes scan {
        0% {
          top: 0;
          opacity: 0;
        }
        10% {
          opacity: 0.5;
        }
        90% {
          opacity: 0.5;
        }
        100% {
          top: 100%;
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="particles"></canvas>

    <div class="scan-line"></div>

    <div class="ui-wrapper">
      <div class="hologram-card" id="card">
        <div class="system-logo">
          <i class="ri-fingerprint-line"></i>
        </div>
        <h1>Nexus Core</h1>
        <p class="subtitle">Authentication</p>

        <form id="loginForm">
          <div class="input-group">
            <input
              type="text"
              id="username"
              placeholder="Username"
              required
              autocomplete="off"
            />
            <i class="ri-user-line"></i>
          </div>

          <div class="input-group">
            <input
              type="password"
              id="password"
              placeholder="Password"
              required
            />
            <i class="ri-lock-line"></i>
          </div>

          <button type="submit" class="btn-cyber" id="loginBtn">
            <span>Initialize</span>
            <i class="ri-arrow-right-s-fill"></i>
          </button>
        </form>

        <div class="role-badge">
          <div><span>[ ADMIN ]</span> admin<br />admin123</div>
          <div style="text-align: right">
            <span>[ USER ]</span> pengguna<br />pengguna123
          </div>
        </div>
      </div>
    </div>

    <script>
      // --- 3D Hover Tilt Effect ---
      const card = document.getElementById("card");
      document.addEventListener("mousemove", (e) => {
        let xAxis = (window.innerWidth / 2 - e.pageX) / 40;
        let yAxis = (window.innerHeight / 2 - e.pageY) / 40;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
      });

      // --- Network Particle System ---
      const canvas = document.getElementById("particles");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      let particlesArray;

      class Particle {
        constructor(x, y, directionX, directionY, size, color) {
          this.x = x;
          this.y = y;
          this.directionX = directionX;
          this.directionY = directionY;
          this.size = size;
          this.color = color;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
          ctx.fillStyle = this.color;
          ctx.fill();
        }
        update() {
          if (this.x > canvas.width || this.x < 0)
            this.directionX = -this.directionX;
          if (this.y > canvas.height || this.y < 0)
            this.directionY = -this.directionY;
          this.x += this.directionX;
          this.y += this.directionY;
          this.draw();
        }
      }

      function initParticles() {
        particlesArray = [];
        let numberOfParticles = (canvas.height * canvas.width) / 12000;
        for (let i = 0; i < numberOfParticles; i++) {
          let size = Math.random() * 2 + 0.5;
          let x = Math.random() * (innerWidth - size * 2 - size * 2) + size * 2;
          let y =
            Math.random() * (innerHeight - size * 2 - size * 2) + size * 2;
          let directionX = Math.random() * 1 - 0.5;
          let directionY = Math.random() * 1 - 0.5;
          particlesArray.push(
            new Particle(
              x,
              y,
              directionX,
              directionY,
              size,
              "rgba(0, 243, 255, 0.8)",
            ),
          );
        }
      }

      function animateParticles() {
        requestAnimationFrame(animateParticles);
        ctx.clearRect(0, 0, innerWidth, innerHeight);
        for (let i = 0; i < particlesArray.length; i++) {
          particlesArray[i].update();
        }
        connect();
      }

      function connect() {
        for (let a = 0; a < particlesArray.length; a++) {
          for (let b = a; b < particlesArray.length; b++) {
            let distance =
              (particlesArray[a].x - particlesArray[b].x) *
                (particlesArray[a].x - particlesArray[b].x) +
              (particlesArray[a].y - particlesArray[b].y) *
                (particlesArray[a].y - particlesArray[b].y);
            if (distance < (canvas.width / 8) * (canvas.height / 8)) {
              let opacityValue = 1 - distance / 15000;
              ctx.strokeStyle = "rgba(157, 78, 221," + opacityValue + ")";
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
              ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
              ctx.stroke();
            }
          }
        }
      }
      window.addEventListener("resize", () => {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
        initParticles();
      });
      initParticles();
      animateParticles();

      // --- Login Logic ---
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const user = document.getElementById("username").value;
          const pass = document.getElementById("password").value;
          const btn = document.getElementById("loginBtn");

          btn.innerHTML =
            '<i class="ri-loader-4-line ri-spin"></i> Processing...';

          setTimeout(() => {
            if (user === "admin" && pass === "admin123") {
              localStorage.setItem("role", "Admin");
              document.body.style.opacity = 0;
              setTimeout(() => (window.location.href = "dashboard.html"), 500);
            } else if (user === "pengguna" && pass === "pengguna123") {
              localStorage.setItem("role", "Pengguna");
              document.body.style.opacity = 0;
              setTimeout(() => (window.location.href = "dashboard.html"), 500);
            } else {
              btn.innerHTML = "ACCESS DENIED";
              btn.style.color = "red";
              btn.style.borderColor = "red";
              setTimeout(() => {
                btn.innerHTML =
                  '<span>Initialize</span><i class="ri-arrow-right-s-fill"></i>';
                btn.style.color = "";
                btn.style.borderColor = "";
              }, 2000);
            }
          }, 1000);
        });
    </script>
  </body>
</html>
