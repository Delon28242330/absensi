<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-base: #030014;
            --neon-cyan: #00f3ff;
            --neon-purple: #9d4edd;
            --neon-pink: #f72585;
            --surface: rgba(10, 10, 25, 0.7);
            --border: rgba(0, 243, 255, 0.15);
            --text-main: #e2e8f0;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        #particles {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .brand {
            display: flex; align-items: center; gap: 15px;
            font-size: 24px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .brand i {
            font-size: 32px;
            color: var(--neon-cyan);
            filter: drop-shadow(0 0 10px var(--neon-cyan));
        }

        .user-control {
            display: flex; align-items: center; gap: 20px;
        }

        .role-badge {
            background: rgba(157, 78, 221, 0.1);
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: inset 0 0 10px rgba(157, 78, 221, 0.2);
        }

        .btn-exit {
            background: transparent;
            color: var(--neon-pink);
            border: 1px solid var(--neon-pink);
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
            text-decoration: none;
        }

        .btn-exit:hover {
            background: var(--neon-pink);
            color: var(--bg-base);
            box-shadow: 0 0 15px var(--neon-pink);
        }

        /* STATS WIDGETS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-cyan);
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.1);
        }

        .stat-card::before {
            content: ''; position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .stat-card.purple::before { background: var(--neon-purple); box-shadow: 0 0 10px var(--neon-purple); }
        .stat-card.pink::before { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

        .stat-title { color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .stat-value { font-size: 36px; font-weight: 700; color: white; }
        .stat-icon { position: absolute; right: 25px; bottom: 25px; font-size: 40px; opacity: 0.1; }

        /* DATA TABLE */
        .data-panel {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
        }

        .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px;
        }

        .panel-title { font-size: 18px; text-transform: uppercase; letter-spacing: 2px; }

        .search-box {
            position: relative; width: 300px;
        }
        .search-box input {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            padding: 10px 15px 10px 40px; color: white; border-radius: 6px; outline: none;
            transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,243,255,0.2); }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--neon-cyan); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; transition: 0.2s; }
        
        tbody tr { transition: 0.3s; }
        tbody tr:hover { background: rgba(0, 243, 255, 0.05); transform: scale(1.01); box-shadow: 0 0 15px rgba(0,243,255,0.05); }

        .type-badge {
            padding: 4px 10px; border-radius: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
        }
        .type-admin { background: rgba(0,243,255,0.1); color: var(--neon-cyan); border: 1px solid var(--neon-cyan); }
        .type-editor { background: rgba(157,78,221,0.1); color: var(--neon-purple); border: 1px solid var(--neon-purple); }
        .type-user { background: rgba(247,37,133,0.1); color: var(--neon-pink); border: 1px solid var(--neon-pink); }

        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 30px; }
        .page-btn {
            background: transparent; border: 1px solid var(--border); color: var(--text-muted);
            width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;
            border-radius: 4px; cursor: pointer; transition: 0.3s;
        }
        .page-btn:hover:not(:disabled) { border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,243,255,0.2); }
        .page-btn.active { background: var(--neon-cyan); color: var(--bg-base); border-color: var(--neon-cyan); box-shadow: 0 0 15px var(--neon-cyan); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <div class="container">
        <header>
            <div class="brand">
                <i class="ri-hexagon-fill"></i> Nexus Command
            </div>
            <div class="user-control">
                <div class="role-badge" id="userRoleBadge">ROLE</div>
                <a href="#" class="btn-exit" id="logoutBtn"><i class="ri-shut-down-line"></i> Disconnect</a>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="ri-group-line stat-icon" style="color: var(--neon-cyan);"></i>
                <div class="stat-title">Total Entities</div>
                <div class="stat-value" id="countAll">0</div>
            </div>
            <div class="stat-card purple">
                <i class="ri-shield-star-line stat-icon" style="color: var(--neon-purple);"></i>
                <div class="stat-title">Active Admins</div>
                <div class="stat-value" id="countAdmin">0</div>
            </div>
            <div class="stat-card pink">
                <i class="ri-edit-2-line stat-icon" style="color: var(--neon-pink);"></i>
                <div class="stat-title">Editors</div>
                <div class="stat-value" id="countEditor">0</div>
            </div>
        </div>

        <div class="data-panel">
            <div class="panel-header">
                <div class="panel-title">System Users Log</div>
                <div class="search-box">
                    <i class="ri-search-2-line"></i>
                    <input type="text" id="searchInput" placeholder="Query database...">
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Ident</th>
                        <th>Designation</th>
                        <th>Handle</th>
                        <th>Clearance</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>

            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        // Particle Background
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particlesArray = [];
        for(let i=0; i<80; i++) {
            particlesArray.push({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5
            });
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = 'rgba(0, 243, 255, 0.5)';
            particlesArray.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0||p.x>canvas.width) p.vx*=-1;
                if(p.y<0||p.y>canvas.height) p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Auth Check
        const role = localStorage.getItem('role');
        if(!role) window.location.href = 'login.html';
        document.getElementById('userRoleBadge').innerText = role;

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('role');
            document.body.style.opacity = 0;
            document.body.style.transition = '0.5s';
            setTimeout(()=>window.location.href='login.html', 500);
        });

        // Data
        const users = [
            { id: "SYS-01", name: "Budi Santoso", username: "budisan", role: "Admin" },
            { id: "SYS-02", name: "Siti Aminah", username: "sitiamin", role: "User" },
            { id: "SYS-03", name: "Andi Saputra", username: "andisap", role: "Editor" },
            { id: "SYS-04", name: "Rina Melati", username: "rinamel", role: "User" },
            { id: "SYS-05", name: "Joko Widodo", username: "jokowid", role: "User" },
            { id: "SYS-06", name: "Agus Yudhoyono", username: "agusyud", role: "Editor" },
            { id: "SYS-07", name: "Megawati", username: "megawat", role: "Admin" },
            { id: "SYS-08", name: "Prabowo Subianto", username: "prabowo", role: "User" },
            { id: "SYS-09", name: "Anies Baswedan", username: "anies", role: "Editor" },
            { id: "SYS-10", name: "Ganjar Pranowo", username: "ganjar", role: "User" },
            { id: "SYS-11", name: "Ridwan Kamil", username: "ridwan", role: "User" },
            { id: "SYS-12", name: "Khofifah Indar", username: "khofifah", role: "Editor" },
            { id: "SYS-13", name: "Erick Thohir", username: "erick", role: "Admin" },
            { id: "SYS-14", name: "Sandiaga Uno", username: "sandiaga", role: "User" },
            { id: "SYS-15", name: "Nadiem Makarim", username: "nadiem", role: "Editor" }
        ];

        // Animate Counters
        function animateValue(id, start, end, duration) {
            let obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }
        
        setTimeout(() => {
            animateValue("countAll", 0, users.length, 1000);
            animateValue("countAdmin", 0, users.filter(u=>u.role==='Admin').length, 1000);
            animateValue("countEditor", 0, users.filter(u=>u.role==='Editor').length, 1000);
        }, 500);

        // Table Logic
        let current = 1; const perPage = 5; let filtered = [...users];
        const tbody = document.getElementById('tableBody');
        const pagi = document.getElementById('pagination');

        function render() {
            tbody.innerHTML = '';
            let start = (current-1)*perPage;
            let items = filtered.slice(start, start+perPage);
            
            if(items.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:30px; color:#64748b;">No data found.</td></tr>`;
            } else {
                items.forEach((u, idx) => {
                    let cls = 'type-user';
                    if(u.role==='Admin') cls='type-admin';
                    if(u.role==='Editor') cls='type-editor';
                    
                    let tr = document.createElement('tr');
                    tr.style.animation = `fadeIn 0.3s ease forwards ${idx*0.1}s`;
                    tr.style.opacity = 0;
                    tr.innerHTML = `
                        <td style="color:var(--text-muted)">${u.id}</td>
                        <td style="font-weight:500; color:white;">${u.name}</td>
                        <td>@${u.username}</td>
                        <td><span class="type-badge ${cls}">${u.role}</span></td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            renderPagi();
        }

        function renderPagi() {
            pagi.innerHTML = '';
            let total = Math.ceil(filtered.length/perPage);
            if(total<=1) return;
            
            let pBtn = document.createElement('button'); pBtn.className='page-btn'; pBtn.innerHTML='<i class="ri-arrow-left-s-line"></i>';
            pBtn.disabled = current===1; pBtn.onclick=()=>{current--; render();}; pagi.appendChild(pBtn);

            for(let i=1; i<=total; i++){
                let b = document.createElement('button'); b.className=`page-btn ${i===current?'active':''}`;
                b.innerText=i; b.onclick=()=>{current=i; render();}; pagi.appendChild(b);
            }

            let nBtn = document.createElement('button'); nBtn.className='page-btn'; nBtn.innerHTML='<i class="ri-arrow-right-s-line"></i>';
            nBtn.disabled = current===total; nBtn.onclick=()=>{current++; render();}; pagi.appendChild(nBtn);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            let q = e.target.value.toLowerCase();
            filtered = users.filter(u => u.name.toLowerCase().includes(q) || u.role.toLowerCase().includes(q) || u.username.toLowerCase().includes(q));
            current = 1; render();
        });

        render();
    </script>
</body>
</html>
